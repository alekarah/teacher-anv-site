{{ define "base" }}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Description }}">
  <meta name="keywords" content="репетитор начальные классы, репетитор онлайн, репетитор Москва, репетитор Санкт-Петербург, репетитор Апрелевка, репетитор Подмосковье, русский язык 1-4 класс, математика начальная школа, подготовка к школе, Агарёва репетитор">
  <meta name="author" content="Агарёва Наталья Владимировна">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0D3D1A">
  <link rel="canonical" href="{{ .CanonicalURL }}">
  <link rel="alternate" hreflang="ru" href="{{ .CanonicalURL }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ru_RU">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Description }}">
  <meta property="og:url" content="{{ .CanonicalURL }}">
  <meta property="og:image" content="{{ .CanonicalURL }}/static/img/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="Репетитор Агарёва Н.В.">

  <!-- Schema.org structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Репетитор Агарёва Наталья Владимировна",
    "description": "{{ .Description }}",
    "url": "{{ .CanonicalURL }}",
    "image": "{{ .CanonicalURL }}/static/img/ava.jpg",
    "priceRange": "₽₽",
    "telephone": "+7 (920) 985-01-12",
    "areaServed": [
      {"@type": "City", "name": "Москва"},
      {"@type": "City", "name": "Санкт-Петербург"},
      {"@type": "City", "name": "Новосибирск"},
      {"@type": "City", "name": "Екатеринбург"},
      {"@type": "City", "name": "Казань"},
      {"@type": "City", "name": "Нижний Новгород"},
      {"@type": "City", "name": "Апрелевка"},
      {"@type": "AdministrativeArea", "name": "Московская область"},
      {"@type": "Country", "name": "Россия"}
    ],
    "serviceType": "Репетиторские услуги",
    "knowsAbout": ["Русский язык", "Математика", "Чтение", "Подготовка к школе", "Начальные классы"],
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Занятия с репетитором",
      "itemListElement": [
        {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Русский язык"}, "price": "1200", "priceCurrency": "RUB"},
        {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Математика"}, "price": "1200", "priceCurrency": "RUB"},
        {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Чтение"}, "price": "1000", "priceCurrency": "RUB"},
        {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Подготовка к школе"}, "price": "1000", "priceCurrency": "RUB"}
      ]
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "5.0",
      "reviewCount": "3",
      "bestRating": "5"
    },
    "person": {
      "@type": "Person",
      "name": "Агарёва Наталья Владимировна",
      "jobTitle": "Учитель начальных классов",
      "description": "Учитель начальных классов с 14-летним стажем, диплом с отличием"
    }
  }
  </script>

  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="image" href="/static/img/hero.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/main.js" defer></script>
  <script src="/static/js/seasons.js" defer></script>
  <script src="/static/js/contact.js" defer></script>
</head>
<body>

<div class="prog"><div class="prog-fill" id="prog"></div></div>

{{ template "content" . }}

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">×</button>
  <div class="lightbox-viewport" id="lightboxViewport">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-zoom-hint" id="lightboxHint"></div>
  <div class="lightbox-zoom-btns">
    <button id="lightboxZoomOut" title="Уменьшить">−</button>
    <button id="lightboxZoomIn" title="Увеличить">+</button>
  </div>
</div>

</body>
</html>
{{ end }}
