{{ define "base" }}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/hero.css">
  <link rel="stylesheet" href="/static/css/nav.css">
  <link rel="stylesheet" href="/static/css/about.css">
  <link rel="stylesheet" href="/static/css/credentials.css">
  <link rel="stylesheet" href="/static/css/seasons.css">
  <link rel="stylesheet" href="/static/css/services.css">
  <link rel="stylesheet" href="/static/css/reviews.css">
  <link rel="stylesheet" href="/static/css/contact.css">
  <link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>

<div class="prog"><div class="prog-fill" id="prog"></div></div>

{{ template "content" . }}

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">×</button>
  <div class="lightbox-viewport" id="lightboxViewport">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-zoom-hint" id="lightboxHint"></div>
  <div class="lightbox-zoom-btns">
    <button id="lightboxZoomOut" title="Уменьшить">−</button>
    <button id="lightboxZoomIn" title="Увеличить">+</button>
  </div>
</div>

<script src="/static/js/main.js"></script>
<script src="/static/js/seasons.js"></script>
<script src="/static/js/contact.js"></script>
</body>
</html>
{{ end }}
