{{ define "contact" }}
<section class="contact-sec" id="contact">
  <div class="hero-particles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span class="wave"></span><span class="wave"></span><span class="wave"></span>
    <span class="wave"></span><span class="wave"></span><span class="wave"></span>
    <span class="wave"></span><span class="wave"></span>
  </div>
  <div class="ct-inner">
    <div class="ct-tag">Записаться</div>
    <h2 class="ct-h">Начнём новый <em>сезон</em> вместе?</h2>
    <button class="form-btn ct-form-btn" id="openModal">Записаться на занятие</button>
  </div>
</section>

<!-- Модальное окно -->
<div class="modal-overlay" id="modalOverlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" id="modalClose" aria-label="Закрыть">&times;</button>
    <div class="ct-tag">Записаться</div>
    <h3 class="modal-title" id="modalTitle">Оставьте заявку</h3>
    <p class="modal-sub">Свяжусь в течение нескольких часов.</p>
    <form class="form" id="contactForm">
      <div class="form-row">
        <div class="field">
          <label for="f-name">Ваше имя</label>
          <input id="f-name" name="name" type="text" placeholder="Мария" required>
        </div>
        <div class="field">
          <label for="f-phone">Телефон / Telegram</label>
          <input id="f-phone" name="phone" type="text" placeholder="+7 999 000-00-00" required>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="f-child">Имя ребёнка</label>
          <input id="f-child" name="child" type="text" placeholder="Саша">
        </div>
        <div class="field">
          <label for="f-grade">Класс</label>
          <select id="f-grade" name="grade">
            <option>Дошкольник</option>
            <option>1 класс</option>
            <option>2 класс</option>
            <option>3 класс</option>
            <option>4 класс</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="f-message">Что хотите улучшить?</label>
        <textarea id="f-message" name="message" placeholder="Расскажите о ситуации..."></textarea>
      </div>
      <button type="submit" class="form-btn">Отправить заявку</button>
    </form>
  </div>
</div>
{{ end }}
